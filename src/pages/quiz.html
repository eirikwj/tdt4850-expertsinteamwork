<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Which LLM Generated This Image?</title>
    <link rel="stylesheet" href="../css/quiz.css">
</head>
<body>

    <div class="container">

        <h1 id="questionText"></h1>
        <div class="progress" id="progress"></div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text" id="progressText"></p>

        <div class="content">
            <div class="image-box">
                <img id="quizImage" src="" alt="Generated Image">
            </div>

            <button class="next-btn" id="nextBtn">Next</button>
        </div>

        <div class="answers">
            <!-- populated dynamically by quiz.js -->
        </div>
    </div>

    <script src="../js/quiz.js"></script>
    <!-- <script src="../js/quiz.obf.js"></script> -->
</body>
</html>
